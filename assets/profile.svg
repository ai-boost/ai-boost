<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="520"
  viewBox="0 0 1200 520"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Adrian Vale</title>
  <desc id="description">
    Building open systems for scientific discovery.
  </desc>

  <defs>
    <pattern
      id="grid"
      width="32"
      height="32"
      patternUnits="userSpaceOnUse"
    >
      <path
        d="M 32 0 L 0 0 0 32"
        fill="none"
        stroke="#252a31"
        stroke-width="1"
      />
    </pattern>

    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="100%" stop-color="#a5b4fc" />
    </linearGradient>

    <style>
      .sans {
        font-family:
          Inter,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .mono {
        font-family:
          "SFMono-Regular",
          Consolas,
          "Liberation Mono",
          monospace;
      }

      .muted {
        fill: #8b949e;
      }

      .soft {
        fill: #c9d1d9;
      }

      .bright {
        fill: #f0f6fc;
      }

      .accent {
        fill: #7dd3fc;
      }
    </style>
  </defs>

  <!-- Canvas -->
  <rect
    width="1200"
    height="520"
    rx="26"
    fill="#0d1117"
  />

  <rect
    x="1"
    y="1"
    width="1198"
    height="518"
    rx="25"
    fill="none"
    stroke="#30363d"
    stroke-width="2"
  />

  <rect
    x="1"
    y="1"
    width="1198"
    height="518"
    rx="25"
    fill="url(#grid)"
    opacity="0.34"
  />

  <!-- Header -->
  <circle cx="64" cy="58" r="5" fill="#7dd3fc">
    <animate
      attributeName="opacity"
      values="0.35;1;0.35"
      dur="2.4s"
      repeatCount="indefinite"
    />
  </circle>

  <text
    x="82"
    y="64"
    class="mono soft"
    font-size="15"
    letter-spacing="2"
  >
    ADRIAN VALE / @AI-BOOST
  </text>

  <text
    x="1136"
    y="64"
    class="mono muted"
    font-size="13"
    letter-spacing="1.6"
    text-anchor="end"
  >
    BUILDING IN PUBLIC
  </text>

  <line
    x1="52"
    y1="88"
    x2="1148"
    y2="88"
    stroke="#30363d"
  />

  <!-- Main statement -->
  <text
    x="64"
    y="168"
    class="sans bright"
    font-size="54"
    font-weight="650"
    letter-spacing="-1.8"
  >
    I build the systems
  </text>

  <text
    x="64"
    y="229"
    class="sans bright"
    font-size="54"
    font-weight="650"
    letter-spacing="-1.8"
  >
    around intelligent models.
  </text>

  <text
    x="66"
    y="278"
    class="sans muted"
    font-size="20"
  >
    Open tools, agent skills, and research infrastructure
  </text>

  <text
    x="66"
    y="309"
    class="sans muted"
    font-size="20"
  >
    for machine-assisted scientific discovery.
  </text>

  <!-- Focus labels -->
  <g transform="translate(64 350)">
    <rect
      width="148"
      height="36"
      rx="18"
      fill="#161b22"
      stroke="#30363d"
    />
    <text
      x="74"
      y="23"
      class="mono soft"
      font-size="13"
      text-anchor="middle"
    >
      AI FOR SCIENCE
    </text>
  </g>

  <g transform="translate(224 350)">
    <rect
      width="154"
      height="36"
      rx="18"
      fill="#161b22"
      stroke="#30363d"
    />
    <text
      x="77"
      y="23"
      class="mono soft"
      font-size="13"
      text-anchor="middle"
    >
      AGENT SYSTEMS
    </text>
  </g>

  <g transform="translate(390 350)">
    <rect
      width="196"
      height="36"
      rx="18"
      fill="#161b22"
      stroke="#30363d"
    />
    <text
      x="98"
      y="23"
      class="mono soft"
      font-size="13"
      text-anchor="middle"
    >
      HARNESS ENGINEERING
    </text>
  </g>

  <!-- Right-side project index -->
  <line
    x1="788"
    y1="124"
    x2="788"
    y2="391"
    stroke="url(#glow)"
    stroke-width="2"
  />

  <text
    x="824"
    y="145"
    class="mono accent"
    font-size="13"
    letter-spacing="2"
