    SELECTED WORK
  </text>

  <text
    x="824"
    y="196"
    class="mono muted"
    font-size="14"
  >
    01
  </text>

  <text
    x="862"
    y="196"
    class="sans bright"
    font-size="18"
    font-weight="600"
  >
    Open Science Desktop
  </text>

  <text
    x="824"
    y="246"
    class="mono muted"
    font-size="14"
  >
    02
  </text>

  <text
    x="862"
    y="246"
    class="sans bright"
    font-size="18"
    font-weight="600"
  >
    AI4S Skills
  </text>

  <text
    x="824"
    y="296"
    class="mono muted"
    font-size="14"
  >
    03
  </text>

  <text
    x="862"
    y="296"
    class="sans bright"
    font-size="18"
    font-weight="600"
  >
    Awesome AI for Science
  </text>

  <text
    x="824"
    y="346"
    class="mono muted"
    font-size="14"
  >
    04
  </text>

  <text
    x="862"
    y="346"
    class="sans bright"
    font-size="18"
    font-weight="600"
  >
    Harness Engineering
  </text>

  <!-- Footer trajectory -->
  <line
    x1="52"
    y1="426"
    x2="1148"
    y2="426"
    stroke="#30363d"
  />

  <text
    x="64"
    y="470"
    class="mono muted"
    font-size="14"
    letter-spacing="1.1"
  >
    PROMPTS
  </text>

  <text x="162" y="470" class="mono accent" font-size="16">→</text>

  <text
    x="196"
    y="470"
    class="mono muted"
    font-size="14"
    letter-spacing="1.1"
  >
    AGENTS
  </text>

  <text x="282" y="470" class="mono accent" font-size="16">→</text>

  <text
    x="316"
    y="470"
    class="mono muted"
    font-size="14"
    letter-spacing="1.1"
  >
    HARNESSES
  </text>

  <text x="426" y="470" class="mono accent" font-size="16">→</text>

  <text
    x="460"
    y="470"
    class="mono bright"
    font-size="14"
    font-weight="600"
    letter-spacing="1.1"
  >
    DISCOVERY
  </text>

  <text
    x="1136"
    y="470"
    class="mono muted"
    font-size="12"
    letter-spacing="1.5"
    text-anchor="end"
  >
    OPEN SYSTEMS / 2026
  </text>
</svg>
